<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#08001a">
<title>Space Puzzle</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div id="ui">
  <div id="hud">
    <div class="hud-box">
      <div class="hud-label">Счёт</div>
      <div class="hud-val" id="score-el">0</div>
    </div>
    <div style="font-size:24px;font-weight:900;color:#a78bfa;letter-spacing:-1px;">SPACE<span style="color:#ffd600;">БЛОК</span></div>
    <div class="hud-box">
      <div class="hud-label">Рекорд</div>
      <div class="hud-val gold" id="best-el">0</div>
    </div>
  </div>

  <div id="board-wrap">
    <canvas id="board"></canvas>
  </div>

  <div id="tray">
    <canvas class="piece-canvas" id="pc0"></canvas>
    <canvas class="piece-canvas" id="pc1"></canvas>
    <canvas class="piece-canvas" id="pc2"></canvas>
  </div>
</div>

<div id="intro-overlay" class="modal-overlay show">
  <div style="font-size:56px;">🌌</div>
  <div class="intro-title">SPACE<span style="color:#ffd600;">БЛОК</span></div>
  <div class="sub" style="max-width:280px;text-align:center;">Укладывай фигуры, очищай ряды и колонки</div>
  <div class="intro-demo-wrap">
    <canvas id="intro-preview-canvas" aria-hidden="true"></canvas>
  </div>
  <div class="play-cta-wrap">
    <div class="play-cta__glow"></div>
    <div class="play-cta__ring play-cta__ring--1"></div>
    <div class="play-cta__ring play-cta__ring--2"></div>
    <button type="button" class="btn-primary btn-primary--play" id="play-btn">Играть</button>
  </div>
</div>

<div id="overlay" class="modal-overlay">
  <div style="font-size:56px;">🌌</div>
  <h1>ИГРА ОКОНЧЕНА</h1>
  <div class="sub">Нет хода для фигур в лотке</div>
  <div class="score-big" id="final-score">0</div>
  <div class="sub" id="final-best"></div>
  <button type="button" id="restart-btn">🚀 Заново</button>
</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
